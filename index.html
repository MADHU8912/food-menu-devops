<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Menu App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🍴 Food Menu App</h1>
    <p>Fresh food for every mood</p>
  </header>

  <section class="menu">
    <div class="card">
      <h2>Pizza</h2>
      <p>Cheesy delight with toppings</p>
      <span>₹199</span>
    </div>

    <div class="card">
      <h2>Burger</h2>
      <p>Loaded burger with fries</p>
      <span>₹149</span>
    </div>

    <div class="card">
      <h2>Biryani</h2>
      <p>Spicy and flavorful rice</p>
      <span>₹249</span>
    </div>

    <div class="card">
      <h2>Ice Cream</h2>
      <p>Sweet dessert for all</p>
      <span>₹99</span>
    </div>
  </section>
</body>
</html>
