services:
  backend:
    build: ./backend
    container_name: food-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: food-frontend
    ports:
      - "8082:80"

  mongo:
    image: mongo
    container_name: food-mongo
    ports:
      - "27017:27017"