apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-backend
  template:
    metadata:
      labels:
        app: food-backend
    spec:
      containers:
        - name: food-backend
          image: nikhilabba12/food-backend:1
          ports:
            - containerPort: 5000